# Connection settings are read from bundled application.properties because a Spring Boot native
# image does not bind command-line args / environment variables to spring.r2dbc.* the way the JVM
# does; only build-time-bundled properties are reliably applied. Placeholders allow overriding from
# the TEST_DB_* environment when that resolution is available, falling back to the CI service
# container coordinates otherwise.
spring.r2dbc.url=r2dbc:mariadb://${TEST_DB_HOST:127.0.0.1}:${TEST_DB_PORT:3306}/${TEST_DB_DATABASE:testr2}
spring.r2dbc.username=${TEST_DB_USER:root}
spring.r2dbc.password=${TEST_DB_PASSWORD:testPassword1!}
logging.level.org.mariadb.r2dbc=DEBUG
