---
name: GraalVM Native Image Test

on:
  push:
    branches: ['master', 'develop*', 'maintenance/*', 'feature/*']
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'

concurrency:
  group: native-image-${{ github.ref }}
  cancel-in-progress: true

env:
  TEST_DB_HOST: 127.0.0.1
  TEST_DB_PORT: 3306
  TEST_DB_USER: root
  TEST_DB_PASSWORD: testPassword1!
  TEST_DB_DATABASE: testr2

jobs:
  # Spring Data R2DBC native-image build + run. Validates that the connector
  # works in a GraalVM native image. The build goes through Spring AOT and the
  # native-maven-plugin, which consults the GraalVM reachability metadata
  # repository -- the curated metadata set that resolves netty/reactor native
  # image requirements. (A standalone raw `native-image` CLI build is not viable
  # here: netty's own embedded metadata is incomplete and the bare CLI cannot
  # consult the reachability metadata repository.)
  spring-boot-native-test:
    name: Spring Boot Native Image (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        java: ['21', '24']

    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: testPassword1!
          MARIADB_DATABASE: testr2
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v6

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ matrix.java }}
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install connector to local Maven repo
        run: mvn install -DskipTests -Dgpg.skip -q

      - name: Resolve connector version
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -Dgpg.skip -DforceStdout)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Connector version: $VERSION"

      - name: Build Spring Boot native image
        run: |
          mvn -Pnative native:compile -q -Dgpg.skip \
            -Dmariadb.connector.version=${{ steps.version.outputs.version }}
        working-directory: .github/native-image-test/spring-boot

      - name: Run Spring Boot native image test
        run: |
          ./target/native-image-spring-test \
            --spring.r2dbc.url=r2dbc:mariadb://${{ env.TEST_DB_HOST }}:${{ env.TEST_DB_PORT }}/${{ env.TEST_DB_DATABASE }} \
            --spring.r2dbc.username=${{ env.TEST_DB_USER }} \
            --spring.r2dbc.password=${{ env.TEST_DB_PASSWORD }}
        working-directory: .github/native-image-test/spring-boot
