# Run-time initialization directives for netty classes that are reachable
# through the connector (via reactor-netty) but whose static initializers
# cannot run at native-image build time. netty's own native-image metadata is
# incomplete here, so the connector supplies the missing directives so that a
# native image including this connector builds out of the box.
#
# 1. io.netty.handler.ssl.BouncyCastleAlpnSslUtils
#    Its static initializer probes for an optional BouncyCastle class via
#    Class.forName, which aborts the build when initialized at build time and
#    BouncyCastle is absent. netty does not flag it for run-time init (verified
#    on netty 4.1.113, the current 4.1 branch and the 4.2 branch).
#
# 2. io.netty.channel.kqueue
#    The kqueue native transport (a connector dependency) has macOS-only native
#    libraries. On other platforms its EventLoop/Native static initializers fail
#    with UnsatisfiedLinkError when initialized at build time. netty ships this
#    same run-time-init directive for the epoll package
#    (netty-transport-classes-epoll) but ships no native-image metadata at all
#    for kqueue, so we mirror epoll's treatment here.
#
# Re-check whether these are still required when bumping the netty version.
Args = --initialize-at-run-time=io.netty.handler.ssl.BouncyCastleAlpnSslUtils,io.netty.channel.kqueue
